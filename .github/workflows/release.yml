name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            electron/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend executable
        working-directory: backend
        run: |
          pyinstaller codebot-backend.spec --noconfirm
          if (Test-Path dist_build) { Remove-Item dist_build -Recurse -Force }
          New-Item -ItemType Directory -Path dist_build | Out-Null
          Copy-Item dist/codebot-backend dist_build/codebot-backend -Recurse

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build and publish GitHub release
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build -- --publish always

      - name: Upload object storage artifacts
        if: ${{ vars.CODEBOT_UPLOAD_OBJECT_STORAGE == 'true' }}
        shell: pwsh
        env:
          RCLONE_CONFIG_CODEBOT: ${{ secrets.CODEBOT_RCLONE_CONFIG }}
          CODEBOT_RCLONE_REMOTE: ${{ secrets.CODEBOT_RCLONE_REMOTE }}
        run: |
          choco install rclone -y
          $dist = "electron/dist/electron_new"
          rclone copy $dist "$env:CODEBOT_RCLONE_REMOTE/Download/codebot" --include "latest.yml" --include "*.exe" --include "*.blockmap" --include "*.yml"
